<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Demos 趣味演示</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Fun Demos 趣味演示</h1>
        <p>点击按钮探索各种有趣现象 · Click a button to explore fun phenomena</p>
    </header>

    <canvas id="myCanvas" width="900" height="700"></canvas>

    <div class="button-grid">
        <div class="section-label">🎨 Art &amp; Visuals 艺术与视觉</div>
        <button class="btn-art" id="showInteractiveFractals">🌀 Fractals 分形</button>
        <button class="btn-art" id="showGenerativeArt">🎨 Generative Art 生成艺术</button>
        <button class="btn-art" id="showInteractiveStorybook">📖 Storybook 故事书</button>

        <div class="section-label">🌌 Space &amp; Nature 空间与自然</div>
        <button class="btn-nature" id="showGalaxySimulation">🌌 Galaxy 星系</button>
        <button class="btn-nature" id="showWeatherEffects">⛈️ Weather Effects 天气</button>
        <button class="btn-nature" id="showTerrainGeneration">🏔️ Terrain 地形</button>
        <button class="btn-nature" id="showVirtualAquarium">🐠 Aquarium 水族馆</button>

        <div class="section-label">🔬 Science &amp; Tech 科学与技术</div>
        <button class="btn-science" id="showInteractivePhysicsSandbox">⚙️ Physics Sandbox 物理沙盒</button>
        <button class="btn-science" id="showInteractiveNeuralNetwork">🧠 Neural Network 神经网络</button>
        <button class="btn-science" id="showAudioVisualizer">🎵 Audio Visualizer 音频可视化</button>
    </div>

    <script src="static/js/fractal.js"></script>
    <script src="static/js/galaxy.js"></script>
    <script src="static/js/audioVisualizer.js"></script>
    <script src="static/js/generativeArt.js"></script>
    <script src="static/js/neuralNetwork.js"></script>
    <script src="static/js/weatherEffects.js"></script>
    <script src="static/js/physicsSandbox.js"></script>
    <script src="static/js/terrainGeneration.js"></script>
    <script src="static/js/aquarium.js"></script>
    <script src="static/js/storybook.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/service-worker.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
